name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jobsync_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d jobsync_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/jobsync_ci
      SECRET_KEY: ci-test-secret-key
      ENV: development
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run Alembic migrations
      run: |
        alembic -c backend/alembic.ini upgrade head

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, '3.10', '3.11']
    env:
      SECRET_KEY: ci-test-secret-key

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest pytest-asyncio httpx
    
    - name: Lint with flake8
      run: |
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 backend --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Run tests
      run: |
        pytest

  resume_output:
    runs-on: ubuntu-latest
    needs: [migrations]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jobsync_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d jobsync_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/jobsync_ci
      SECRET_KEY: ci-test-secret-key
      ENV: development
      CORS_ORIGINS: http://localhost:3000
      FORCE_REBUILD: '1'
      TEST_EMAIL: autotest+e2e2026@example.com
      TEST_PASSWORD: TestPass123!
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install requests

    - name: Run Alembic migrations
      run: |
        alembic -c backend/alembic.ini upgrade head

    - name: Seed test job and test user
      run: |
        JOB_OUTPUT=$(python scripts/insert_test_job.py)
        echo "$JOB_OUTPUT"
        JOB_ID=$(echo "$JOB_OUTPUT" | awk '/Inserted job id/ {print $4}' | tail -1)
        if [ -z "$JOB_ID" ]; then
          echo "Failed to capture seeded job id"
          exit 1
        fi
        echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV
        python scripts/create_test_user.py

    - name: Start backend server
      run: |
        python -m uvicorn backend.main:app --host 127.0.0.1 --port 8000 --log-level warning > backend.log 2>&1 &
        for i in $(seq 1 30); do
          if curl -fsS http://127.0.0.1:8000/ >/dev/null; then
            exit 0
          fi
          sleep 2
        done
        cat backend.log
        exit 1

    - name: Seed structured profile
      run: |
        python scripts/seed_test_profile.py

    - name: Validate resume output
      run: |
        python scripts/test_resume_output.py

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black flake8
    
    - name: Check code formatting with Black
      run: |
        black --check backend/
