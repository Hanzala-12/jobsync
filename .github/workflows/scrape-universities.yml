name: Daily University Scrape

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

jobs:
  scrape-universities:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run QS scrape
        run: python scripts/scrape_qs_rankings.py --limit 10
      - name: Run Erasmus scrape
        run: python scripts/scrape_erasmus.py --limit 10
      - name: Run Malaysian universities scrape
        run: python scripts/scrape_malaysian_universities.py --limit 10
