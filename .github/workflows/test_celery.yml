name: test-celery-redis

on:
  push:
    branches: [main]
  pull_request:

jobs:
  celery-redis:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Celery worker
        env:
          CELERY_BROKER_URL: redis://127.0.0.1:6379/0
          CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/1
          ENABLE_CELERY: 'true'
          REDIS_URL: redis://127.0.0.1:6379/0
        run: |
          nohup celery -A backend.celery_app:celery_app worker --loglevel=info --pool=solo > celery.log 2>&1 &

      - name: Run Redis integration smoke test
        env:
          CELERY_BROKER_URL: redis://127.0.0.1:6379/0
          CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/1
          ENABLE_CELERY: 'true'
          REDIS_URL: redis://127.0.0.1:6379/0
        run: |
          python scripts/test_celery_redis_integration.py --timeout 30