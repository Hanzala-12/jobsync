version: '3.9'

services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./jobsync.db}
      CHROMA_DB_DIR: ${CHROMA_DB_DIR:-./chroma_db}
      LLM_FALLBACK_MODE: ${LLM_FALLBACK_MODE:-false}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:5173"]}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-100}
      RATE_LIMIT_PERIOD: ${RATE_LIMIT_PERIOD:-60}
      ENABLE_STUDENT_MODULE: ${ENABLE_STUDENT_MODULE:-true}
      MAX_MATCH_RESULTS: ${MAX_MATCH_RESULTS:-50}
      MATCH_CACHE_TTL_DAYS: ${MATCH_CACHE_TTL_DAYS:-7}
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt && alembic upgrade head && uvicorn backend.main:app --host 0.0.0.0 --port 8000"

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - ./:/app
    ports:
      - "4173:4173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    command: >
      sh -c "npm install && npm run build && npm run preview -- --host 0.0.0.0 --port 4173"
    depends_on:
      - backend
